<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>汉字考试冲刺App</title>

<script src="./hanzi-writer.min.js"></script>

<style>
body {font-family: system-ui; background:#f3f8ff; margin:0; padding:20px;}
h1 {text-align:center; color:#ff6b6b;}
.grid {display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:15px;}
.card {background:white; border-radius:15px; padding:15px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.1); cursor:pointer;}
.char {font-size:60px;}
.modal {display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;}
.modal-content {background:white; width:90%; max-width:420px; border-radius:20px; padding:20px; text-align:center;}
#writer {width:300px; height:300px; margin:15px auto; border:2px solid #ddd;}
button {padding:10px; border:none; border-radius:10px; margin:5px; background:#4ecdc4; color:white;}
.red{background:#ff6b6b;}
.orange{background:#ff9f43;}
.info{font-size:14px;color:#666;margin-top:10px;}
</style>
</head>

<body>

<h1>📝 汉字考试冲刺App</h1>

<div style="text-align:center;margin-bottom:15px;">
<button onclick="toggleWrong()">错题</button>
<button onclick="randomOne()">随机</button>
<button onclick="togglePinyin()" class="orange">隐藏拼音</button>
<button onclick="clearWrong()" class="red">清空错题</button>
</div>

<div id="list" class="grid"></div>

<div id="modal" class="modal">
<div class="modal-content">

<h2 id="char" style="font-size:80px;"></h2>
<div id="pinyin"></div>
<div id="word"></div>
<div id="structure" class="info"></div>

<div id="writer"></div>

<button onclick="writer.animateCharacter()">笔顺</button>
<button onclick="startQuiz()">描红</button>
<button onclick="speak()">🔊读音</button>

<hr>

<h3>听写</h3>
<button onclick="speak()">🔊再读一遍</button><br>
<input id="input" placeholder="写这个字" style="padding:10px;margin-top:10px;">
<br>
<button onclick="check()">提交</button>
<div id="result"></div>

<br>
<button onclick="next()">下一题</button>
<button onclick="closeModal()" class="red">关闭</button>

</div>
</div>

<script>

const vocab = [
{char:"悲",pinyin:"bēi",word:"悲伤",structure:"上下结构 心"},
{char:"惨",pinyin:"cǎn",word:"悲惨",structure:"左右结构 忄"},
{char:"兽",pinyin:"shòu",word:"野兽",structure:"独体字"},
{char:"佩",pinyin:"pèi",word:"佩戴",structure:"左右结构 亻"},
{char:"违",pinyin:"wéi",word:"违反",structure:"半包围 辶"},
{char:"抗",pinyin:"kàng",word:"反抗",structure:"左右结构 扌"},
{char:"锁",pinyin:"suǒ",word:"锁住",structure:"左右结构 钅"},
{char:"既",pinyin:"jì",word:"既然",structure:"左右结构"},
{char:"愤",pinyin:"fèn",word:"愤怒",structure:"左右结构 忄"},
{char:"哩",pinyin:"li",word:"哩",structure:"左右结构 口"},
{char:"级",pinyin:"jí",word:"年级",structure:"左右结构 纟"},
{char:"链",pinyin:"liàn",word:"项链",structure:"左右结构 钅"},
{char:"颤",pinyin:"chàn",word:"颤抖",structure:"左右结构 页"},
{char:"攀",pinyin:"pān",word:"攀爬",structure:"上下结构 手"},
{char:"猴",pinyin:"hóu",word:"猴子",structure:"左右结构 犭"},
{char:"鲫",pinyin:"jì",word:"鲫鱼",structure:"左右结构 鱼"},
{char:"念",pinyin:"niàn",word:"想念",structure:"上下结构 心"},
{char:"辫",pinyin:"biàn",word:"辫子",structure:"左中右结构"},
{char:"呵",pinyin:"hē",word:"呵气",structure:"左右结构 口"},
{char:"庭",pinyin:"tíng",word:"庭院",structure:"半包围 广"},
{char:"纳",pinyin:"nà",word:"接纳",structure:"左右结构 纟"},
{char:"仰",pinyin:"yǎng",word:"仰头",structure:"左右结构 亻"},
{char:"船",pinyin:"chuán",word:"船只",structure:"左右结构 舟"},
{char:"昧",pinyin:"mèi",word:"愚昧",structure:"左右结构 日"},
{char:"坠",pinyin:"zhuì",word:"坠落",structure:"上下结构 土"},
{char:"梦",pinyin:"mèng",word:"做梦",structure:"上下结构"},
{char:"幻",pinyin:"huàn",word:"幻想",structure:"左右结构 幺"},
{char:"熟",pinyin:"shú",word:"熟悉",structure:"上下结构 灬"},
{char:"静",pinyin:"jìng",word:"安静",structure:"左右结构 青"}
];

let writer, current, wrong={}, hide=false, onlyWrong=false;

function render(){
const list=document.getElementById("list");
list.innerHTML="";
vocab.filter(v=>!onlyWrong||wrong[v.char]).forEach(v=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<div class="char">${v.char}</div>
<div>${hide?"***":v.pinyin}</div>
<div>${v.word}</div>`;
div.onclick=()=>open(v);
list.appendChild(div);
});
}

function open(v){
current=v;
document.getElementById("modal").style.display="flex";
document.getElementById("char").innerText=v.char;
document.getElementById("pinyin").innerText=hide?"":v.pinyin;
document.getElementById("word").innerText=v.word;
document.getElementById("structure").innerText=v.structure;
document.getElementById("writer").innerHTML="";
writer=HanziWriter.create("writer",v.char,{width:300,height:300});
}

function startQuiz(){
writer.quiz({
onComplete:(s)=>{
if(s.totalMistakes===0){delete wrong[current.char];alert("✅正确")}
else{wrong[current.char]=1;alert("❌再练")}
render();
}});
}

function speak(){
speechSynthesis.speak(new SpeechSynthesisUtterance(current.char));
}

function check(){
let val=document.getElementById("input").value;
if(val===current.char){alert("✅对");delete wrong[current.char]}
else{alert("❌错");wrong[current.char]=1}
render();
}

function next(){
open(vocab[Math.floor(Math.random()*vocab.length)]);
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function toggleWrong(){onlyWrong=!onlyWrong;render();}
function togglePinyin(){hide=!hide;render();}
function randomOne(){open(vocab[Math.floor(Math.random()*vocab.length)]);}
function clearWrong(){wrong={};render();}

render();
</script>

</body>
</html>
